<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - 2D Society</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'facebook-blue': '#1877f2',
                        'facebook-dark': '#166fe5'
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-facebook-blue to-facebook-dark min-h-screen flex items-center justify-center">
    <div class="bg-white rounded-xl shadow-2xl p-8 w-full max-w-md">
        <div class="text-center mb-8">
            <i class="fas fa-shield-alt text-4xl text-facebook-blue mb-4"></i>
            <h1 class="text-2xl font-bold text-gray-900">Admin Login</h1>
            <p class="text-gray-600 mt-2">Access the admin dashboard</p>
        </div>

        {{if .error}}
        <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
            <i class="fas fa-exclamation-triangle mr-2"></i>{{.error}}
        </div>
        {{end}}

        <form method="POST" action="/admin/login" class="space-y-6">
            <div>
                <label for="username" class="block text-sm font-medium text-gray-700 mb-2">
                    <i class="fas fa-user mr-1"></i>Username
                </label>
                <input type="text" id="username" name="username" required
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-facebook-blue focus:border-transparent transition-all"
                    placeholder="Enter your username">
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-2">
                    <i class="fas fa-lock mr-1"></i>Password
                </label>
                <input type="password" id="password" name="password" required
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-facebook-blue focus:border-transparent transition-all"
                    placeholder="Enter your password">
            </div>

            <button type="submit" 
                class="w-full bg-facebook-blue text-white py-3 px-4 rounded-lg hover:bg-facebook-dark transition-colors font-medium">
                <i class="fas fa-sign-in-alt mr-2"></i>Login
            </button>
        </form>

        <div class="mt-6 text-center">
            <a href="/" class="text-facebook-blue hover:underline text-sm">
                <i class="fas fa-arrow-left mr-1"></i>Back to Website
            </a>
        </div>

        <div class="mt-8 p-4 bg-gray-50 rounded-lg">
            <p class="text-xs text-gray-600 text-center">
                <i class="fas fa-info-circle mr-1"></i>
                Default credentials: admin / admin123
            </p>
        </div>
    </div>
</body>
</html>
